<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Main Interface</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        
        nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 10px 20px;
            border: 1px solid black;
        }

        ul {
            list-style-type: none;
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 10px;           
        }

        ul a{
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        ul a:hover {
            color: #007BFF;
        }

        /* Remove underline for Customer Options */
        .customer-options a,
        .customer-options span {
            text-decoration: none !important;
        }

        .customer-options a:hover,
        .customer-options span:hover {
            text-decoration: none !important;
        }

        /* Dropdown styles */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #fff;
            min-width: 180px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            z-index: 1;
            border: 1px solid #ccc;
            padding: 10px 0;
            top: 100%;
            left: 0;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #333;
            padding: 8px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .customer-options {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        #search-btn {
            cursor: pointer;
            font-weight: bold;
        }

        #search-panel {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            background-color: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            z-index: 100;
            width: 300px;
        }

        .product-section {
            padding: 20px;
        }

        .product-image {
            width:300px;
            height:200px;
            margin: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid black;
            cursor: pointer;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <header>
        <a href="cus_main_interface.html" style="text-decoration: none;color: black;"><h1>Welcome to ...</h1></a>
    </header>

    <!-- Navigation -->
    <nav>
        <!-- Left side: Categories -->
        <ul> 
            <li><a href="about_us.html">About Us</a></li>
            <li><a href="cus_location.html">Store Locations</a></li>
            <li><a href="cus_contact.html">Contact Us</a></li>
        </ul>

        <!-- Right side: Customer Options -->
        <div class="customer-options">
            <span id="search-btn">Search Function</span>
            
            <div class="dropdown">
                <a href="#">Customer</a>
                <div class="dropdown-content">
                    <a href="cus_Login.html">Login</a>
                    <a href="cus_Signup.html">Sign Up</a>
                </div>
            </div>
            
            <a href="#" id="my-orders">My Orders</a>
        </div>       
    </nav>

    <!-- Search Panel -->
    <div id="search-panel">
        <input type="text" id="search-input" placeholder="Search products..." style="width:100%; padding:8px; margin-bottom:10px;">
        <button onclick="performSearch()" style="padding:8px 16px;">Search</button>
    </div>

    <!-- Product Categories -->
    <div>
        <ul class="product-categories" style="display:flex; gap:30px; margin-bottom:20px; background: white; border: 1px solid black; padding: 20px;">
             <li class="dropdown">
                <a href="cus_cat_living.html">Living</a>
                <div class="dropdown-content">
                    <a href="cus_cat_sofas.html">Sofas</a>
                </div>
            </li>
            <li class="dropdown">
                <a href="cus_cat_dining.html">Dining</a>
                <div class="dropdown-content">
                    <a href="cus_cat_dining_tables.html">Dining Tables</a>
                    <a href="cus_cat_dining_chairs.html">Dining Chairs</a>
                </div>
            </li>
        </ul>   
    </div>

    <!-- Product Display -->
    <section class="product-section">
        <h2>Sofas</h2>
        <div class="product-list" style="display:flex; flex-wrap:wrap;">
            <div class="product-item">
                <button onclick="window.location.href='cus_product_view.html'" class="product-image">
                   <img src="../../USED PICTURE/PRODUCT PIC/archer_sand_beige_right_sectional_sofa_2_1.jpg" alt="Product 1">
                </button>
                <h3>Product Name</h3>
                <p>Short description of the product 1.</p>
            </div>
        </div>
    </section>

    <script>
        // ============== Login Status ==============
        let isLoggedIn = false;   // Change to `true` after successful login

        // ============== My Orders - Login Check ==============
        document.getElementById('my-orders').addEventListener('click', function(e) {
            e.preventDefault();
            
            if (isLoggedIn) {
                window.location.href = "my_orders.html";   // Change if your page name is different
            } else {
                window.location.href = "cus_Login.html";
            }
        });

        // ============== Search Panel Toggle ==============
        const searchBtn = document.getElementById('search-btn');
        const searchPanel = document.getElementById('search-panel');
        let isSearchOpen = false;
        
        searchBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            isSearchOpen = !isSearchOpen;
            searchPanel.style.display = isSearchOpen ? 'block' : 'none';
        });
        
        // Close search when clicking outside
        document.addEventListener('click', function() {
            if (isSearchOpen) {
                searchPanel.style.display = 'none';
                isSearchOpen = false;
            }
        });
        
        searchPanel.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // Optional Search Function
        function performSearch() {
            const keyword = document.getElementById('search-input').value.trim();
            if (keyword) {
                alert("Searching for: " + keyword);
                // You can replace this with actual search logic later
            }
        }
    </script>
</body>
</html>
