<div class="checkout-view" style="padding: 20px 40px; max-width: 1200px; margin: auto; color: #1e2937;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">
        <h1 style="font-size: 32px; font-family: 'Roboto Slab', serif; margin: 0;">Checkout</h1>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px;">
        
        <div style="display: flex; flex-direction: column; gap: 30px;">
            
            <div style="background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <h3 style="margin-top: 0; font-size: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;">Shipping Details</h3>
                <div id="order-shipping-info" style="color: #475569; line-height: 1.6; font-size: 15px;">
                    Loading shipping information...
                </div>
            </div>

            <div style="background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <h3 style="margin-top: 0; font-size: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;">Order Items</h3>
                <div id="order-items-container" style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
                    </div>
            </div>
        </div>

        <div style="position: sticky; top: 20px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; height: fit-content; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
            <h3 style="margin-top: 0; border-bottom: 1px dashed #e2e8f0; padding-bottom: 15px; font-size: 20px;">Payment Summary</h3>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: #475569;">
                <span>Subtotal:</span>
                <span id="order-subtotal">RM 0.00</span>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: #475569;">
                <span>Shipping Fee:</span>
                <span style="color: #2ecc71;">Free</span>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 24px; font-weight: bold; color: #1e2937; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                <span>Total:</span>
                <span id="order-total" style="color: #e67e22;">RM 0.00</span>
            </div>

            <button id="btn-pay" style="width: 100%; background: #1e2937; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s;">
                <i class="fa-solid fa-credit-card" style="margin-right: 8px;"></i> Pay Now
            </button>
        </div>

    </div>
</div>
