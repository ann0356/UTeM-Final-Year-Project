<div class="cart-view" style="padding: 20px 40px; max-width: 1200px; margin: auto; color: #1e2937;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">
        <h1 style="font-size: 32px; font-family: 'Roboto Slab', serif; margin: 0;">My Cart</h1>
        <span id="cart-item-count" style="color: #64748b; font-size: 16px;">0 items</span>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px;">
        
        <div id="cart-items-container" style="display: flex; flex-direction: column; gap: 20px;">
            <p id="empty-cart-msg" style="text-align: center; color: #94a3b8; font-size: 18px; padding: 40px; display: none;">Your cart is empty. Let's go shopping!</p>
        </div>

        <div style="position: sticky; top: 20px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; height: fit-content; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
            <h3 style="margin-top: 0; border-bottom: 1px dashed #e2e8f0; padding-bottom: 15px; font-size: 20px;">Order Summary</h3>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: #475569;">
                <span>Selected Items:</span>
                <span id="summary-count">0</span>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 24px; font-weight: bold; color: #1e2937;">
                <span>Total:</span>
                <span id="summary-total" style="color: #e67e22;">RM 0.00</span>
            </div>

            <button id="btn-checkout" disabled style="width: 100%; background: #cbd5e1; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: not-allowed; transition: background 0.3s;">
                Proceed to Checkout
            </button>
        </div>

    </div>
</div>
