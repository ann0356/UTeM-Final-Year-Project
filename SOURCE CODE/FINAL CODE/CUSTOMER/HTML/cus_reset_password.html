<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://dzgtfwdqfqecetnfhcdi.supabase.co/storage/v1/object/public/furniture-images/ruma_logo_white.png">
    <title>Reset Password | Ruma Furniture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .auth-card h2 { color: #0f172a; margin-top: 0; margin-bottom: 10px; }
        .auth-card p { color: #64748b; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #3b82f6; }
        .btn-primary { background: #1e293b; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-primary:hover { background: #334155; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .back-link { display: inline-block; margin-top: 20px; color: #3b82f6; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        
        /* 控制两个界面的显示和隐藏 */
        #request-section { display: none; }
        #update-section { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div style="margin-bottom: 20px;">
            <i class="fa-solid fa-couch" style="font-size: 40px; color: #1e293b;"></i>
        </div>

        <div id="request-section">
            <h2>Forgot Password?</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            
            <form id="request-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="req-email" placeholder="e.g. your@email.com" required>
                </div>
                <button type="submit" id="btn-send" class="btn-primary">Send Reset Link</button>
            </form>
            <a href="cus_login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>

        <div id="update-section">
            <h2>Set New Password</h2>
            <p>Please enter your new password below.</p>
            
            <form id="update-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="upd-password" placeholder="At least 8 characters with +@_%!-" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="upd-confirm" placeholder="Type password again" required minlength="8">
                </div>

                <button type="submit" id="btn-update" class="btn-primary">Update Password</button>
            </form>
            <a href="#" id="cancel-reset" class="back-link">Cancel & Return to Home</a>
        </div>
    </div>

    <script type="module" src="../JS/cus_reset_password.js"></script>
</body>
</html>
