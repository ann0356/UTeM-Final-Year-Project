<style>
    .feedback-container { padding: 20px; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
    .msg-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .msg-list th { text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: #64748b; }
    .msg-list td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    .unread { background: #fee2e2; color: #b91c1c; }
    .read { background: #dcfce7; color: #15803d; }
    .btn-action { background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
</style>

<div class="feedback-container">
    <h2>Customer Feedback Center</h2>
    <table class="msg-list">
        <thead>
            <tr>
                <th>Status</th>
                <th>Details</th>
                <th>Order #</th>
                <th>Message</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="feedback-tbody">
            </tbody>
    </table>
</div>
