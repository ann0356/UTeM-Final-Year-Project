<div class="products-page">
    <div class="page-header" style="margin-bottom: 20px;">
        <h2>📦 Furniture Management</h2>
        <div id="breadcrumb" style="margin-top: 10px; font-size: 14px; color: #64748b; cursor: pointer;">
            <span id="nav-categories" style="font-weight: bold; color: #3498db;">Categories</span>
            <span id="nav-type-separator" style="display: none;"> / <span id="nav-type"></span></span>
            <span id="nav-furniture-separator" style="display: none;"> / <span id="nav-furniture"></span></span>
        </div>
    </div>

    <div id="list-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
        </div>

    <div id="modal-category" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 400px;">
            <h3>Add New Category</h3>
            <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                <label>Category Name</label>
                <input type="text" id="input-cat-name" placeholder="e.g. Living Room" style="padding: 8px;">
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-cancel" onclick="document.getElementById('modal-category').style.display='none'">Cancel</button>
                <button id="btn-save-category" class="btn-primary" style="background: #2ecc71; color: white; padding: 8px 15px; border: none; cursor: pointer;">Save</button>
            </div>
        </div>
    </div>

    <div id="modal-type" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 400px;">
            <h3>Add New Type</h3>
            <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                <label>Type Name</label>
                <input type="text" id="input-type-name" placeholder="e.g. Sofa" style="padding: 8px;">
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-cancel" onclick="document.getElementById('modal-type').style.display='none'">Cancel</button>
                <button id="btn-save-type" class="btn-primary" style="background: #2ecc71; color: white; padding: 8px 15px; border: none; cursor: pointer;">Save</button>
            </div>
        </div>
    </div>

    <div id="modal-furniture" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 450px;">
            <h3>Add New Furniture Product</h3>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
                <label>Furniture ID (Manual/Unique)</label>
                <input type="text" id="input-fur-id" placeholder="e.g. f001" style="padding: 8px;">
                <label>Furniture Name</label>
                <input type="text" id="input-fur-name" placeholder="e.g. Nordic Oak Sofa" style="padding: 8px;">
                <label>Description</label>
                <textarea id="input-fur-desc" rows="3" placeholder="Enter product description..." style="padding: 8px;"></textarea>
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-cancel" onclick="document.getElementById('modal-furniture').style.display='none'">Cancel</button>
                <button id="btn-save-furniture" class="btn-primary" style="background: #2ecc71; color: white; padding: 10px 20px; border: none; cursor: pointer;">Save Product</button>
            </div>
        </div>
    </div>

    <div id="modal-structure" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 101; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 450px; max-height: 90vh; overflow-y: auto;">
            <h3>Add New Structure (Variant)</h3>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
                <label>Structure ID (Manual/Unique)</label>
                <input type="text" id="input-str-id" placeholder="e.g. s001" style="padding: 8px;">
                <label>Structure Name</label>
                <input type="text" id="input-str-name" placeholder="e.g. Premium Leather - Brown" style="padding: 8px;">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>Price (RM)</label>
                        <input type="number" id="input-str-price" placeholder="0" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Stock</label>
                        <input type="number" id="input-str-stock" placeholder="0" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Colour</label>
                        <input type="text" id="input-str-colour" placeholder="Brown" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Material</label>
                        <input type="text" id="input-str-material" placeholder="Leather" style="padding: 8px; width:100%;">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-top: 1px dashed #ddd; padding-top: 10px;">
                    <div>
                        <label>Length (cm)</label>
                        <input type="number" id="input-str-length" placeholder="0" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Width (cm)</label>
                        <input type="number" id="input-str-width" placeholder="0" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Height (cm)</label>
                        <input type="number" id="input-str-height" placeholder="0" style="padding: 8px; width:100%;">
                    </div>
                </div>

                <label>Upload Image</label>
                <input type="file" id="input-str-image" accept="image/*">
                <label>Upload 3D Model (.glb ONLY)</label>
                <input type="file" id="input-str-model" accept=".glb">
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-cancel" onclick="document.getElementById('modal-structure').style.display='none'">Cancel</button>
                <button id="btn-save-structure" class="btn-primary" style="background: #2ecc71; color: white; padding: 10px 20px; border: none; cursor: pointer;">Upload & Save</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-generic" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 400px;">
            <h3 id="edit-generic-title">Edit Details</h3>
            <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                <label>Name</label>
                <input type="text" id="input-edit-name-val" style="padding: 8px; width: 100%;">
                
                <div id="edit-desc-container" style="display: none; flex-direction: column; gap: 10px; margin-top: 5px;">
                    <label>Description</label>
                    <textarea id="input-edit-desc-val" rows="4" style="padding: 8px; width: 100%; resize: vertical;"></textarea>
                </div>
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-cancel" onclick="document.getElementById('modal-edit-generic').style.display='none'">Cancel</button>
                <button id="btn-submit-edit-generic" class="btn-primary" style="background: #3498db; color: white; padding: 8px 15px; border: none; cursor: pointer;">Update</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-structure" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 102; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 450px; max-height: 90vh; overflow-y: auto;">
            <h3>Edit Structure Data</h3>
            <p style="color: #7f8c8d; font-size:13px;">Structure ID: <span id="label-edit-str-id" style="font-weight: bold;"></span> (Cannot be modified)</p>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
                <label>Structure Name</label>
                <input type="text" id="input-edit-str-name" style="padding: 8px;">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>Price (RM)</label>
                        <input type="number" id="input-edit-str-price" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Stock</label>
                        <input type="number" id="input-edit-str-stock" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Colour</label>
                        <input type="text" id="input-edit-str-colour" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Material</label>
                        <input type="text" id="input-edit-str-material" style="padding: 8px; width:100%;">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-top: 1px dashed #ddd; padding-top: 10px;">
                    <div>
                        <label>Length (cm)</label>
                        <input type="number" id="input-edit-str-length" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Width (cm)</label>
                        <input type="number" id="input-edit-str-width" style="padding: 8px; width:100%;">
                    </div>
                    <div>
                        <label>Height (cm)</label>
                        <input type="number" id="input-edit-str-height" style="padding: 8px; width:100%;">
                    </div>
                </div>

                <label>Update Image <span style="font-weight:normal; color:#95a5a6;">(Leave empty to keep old)</span></label>
                <input type="file" id="input-edit-str-image" accept="image/*">
                <label>Update 3D Model (.glb) <span style="font-weight:normal; color:#95a5a6;">(Leave empty to keep old)</span></label>
                <input type="file" id="input-edit-str-model" accept=".glb">
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-cancel" onclick="document.getElementById('modal-edit-structure').style.display='none'">Cancel</button>
                <button id="btn-submit-edit-structure" class="btn-primary" style="background: #3498db; color: white; padding: 10px 20px; border: none; cursor: pointer;">Apply Changes</button>
            </div>
        </div>
    </div>

    <div id="modal-3d-preview" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 500px; height: 500px; display: flex; flex-direction: column; position: relative;">
            <h3>3D Model Preview</h3>
            <button onclick="document.getElementById('modal-3d-preview').style.display='none'" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: #7f8c8d;">✕</button>
            <div id="model-viewer-container" style="flex: 1; width: 100%; height: 100%; border: 1px solid #eee; border-radius: 4px;"></div>
        </div>
    </div>
</div>
