<div class="dashboard-page" style = "padding: 50px;">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>📊 Dashboard</h2>
        
        <div class="action-bar" style="display: flex; gap: 15px; align-items: center;">
            <select id="filter-year" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>

            <select id="filter-month" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="all">All Year</option>
                <option value="01">Jan</option>
                <option value="02">Feb</option>
                <option value="03">Mar</option>
                <option value="04">Apr</option>
                <option value="05">May</option>
                <option value="06">Jun</option>
                <option value="07">Jul</option>
                <option value="08">Aug</option>
                <option value="09">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
            </select>

            <button id="export-report-btn" class="btn-primary" style="padding: 8px 15px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 4px;">
                📄 Export Report
            </button>
        </div>
    </div>

    <div class="kpi-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
        <div class="kpi-card" style="background: #f8f9fa; padding: 20px; border-radius: 8px; text-align: center;">
            <h3>Total Revenue</h3>
            <p id="kpi-revenue" style="font-size: 24px; font-weight: bold; color: #2ecc71;">Loading...</p>
        </div>
        <div class="kpi-card" style="background: #f8f9fa; padding: 20px; border-radius: 8px; text-align: center;">
            <h3>Total Orders</h3>
            <p id="kpi-orders" style="font-size: 24px; font-weight: bold; color: #3498db;">Loading...</p>
        </div>
        <div class="kpi-card" style="background: #f8f9fa; padding: 20px; border-radius: 8px; text-align: center;">
            <h3>New Users</h3>
            <p id="kpi-users" style="font-size: 24px; font-weight: bold; color: #9b59b6;">Loading...</p>
        </div>
        <div class="kpi-card" style="background: #f8f9fa; padding: 20px; border-radius: 8px; text-align: center;">
            <h3>Top Product</h3>
            <p id="kpi-hot-product" style="font-size: 20px; font-weight: bold; color: #e67e22;">Loading...</p>
        </div>
    </div>

    <div class="charts-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
        <div class="chart-container" style="background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
            <h3>📈 Sales Trend</h3>
            <canvas id="salesChart"></canvas>
        </div>

        <div class="chart-container" style="background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
            <h3>🛋️ Top Categories</h3>
            <canvas id="categoryChart"></canvas>
        </div>
    </div>
</div>
